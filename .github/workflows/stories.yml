name: Daily Stories
on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "55 5 * * *"
    - cron: "50 6 * * *"
    - cron: "45 7 * * *"
    - cron: "40 8 * * *"
    - cron: "35 9 * * *"
    - cron: "30 10 * * *"
    - cron: "25 11 * * *"
    - cron: "20 12 * * *"
    - cron: "15 13 * * *"
    - cron: "10 14 * * *"
    - cron: "5 15 * * *"
  workflow_dispatch:
jobs:
  story:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install instagrapi Pillow requests
      - name: Post story
        run: python instagram_auto.py story
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
