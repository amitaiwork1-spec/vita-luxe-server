name: Viral Reels
on:
  schedule:
    - cron: "0 9 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:
jobs:
  reel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg --fix-missing -qq
      - name: Install deps
        run: pip install instagrapi Pillow requests -q
      - name: Post viral reel
        run: python instagram_auto.py reel
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
