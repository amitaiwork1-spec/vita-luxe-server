name: Growth Engine
on:
  schedule:
    - cron: "30 7 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:
jobs:
  grow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install instagrapi requests -q
      - name: Run growth session
        run: python growth_engine.py
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
      - name: Save growth log
        uses: actions/upload-artifact@v4
        with:
          name: growth-log
          path: growth_log.json
        if: always()
