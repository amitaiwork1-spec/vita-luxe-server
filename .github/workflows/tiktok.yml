name: Daily TikTok Videos
on:
  schedule:
    - cron: "0 8 * * *"
    - cron: "0 13 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:
jobs:
  tiktok:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg -qq
      - name: Install deps
        run: pip install playwright requests Pillow -q && python -m playwright install chromium --with-deps
      - name: Post to TikTok
        run: python post_to_tiktok.py
        env:
          TIKTOK_EMAIL: ${{ secrets.TIKTOK_EMAIL }}
          TIKTOK_PASSWORD: ${{ secrets.TIKTOK_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
